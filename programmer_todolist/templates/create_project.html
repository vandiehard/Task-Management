{% extends 'base.html' %}
{% block title %}Create Project{% endblock %}
{% block content %}
<div class="container py-4 fade-in">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card border-0">
                <div class="card-header"><h5 class="mb-0 fw-bold"><i class="fas fa-plus-circle me-2 text-primary"></i>Create New Project</h5></div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Title</label>
                            <input type="text" name="title" class="form-control" placeholder="Project title" value="{{ form.title.value|default:'' }}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea name="description" class="form-control" rows="4" placeholder="Describe the project..." required>{{ form.description.value|default:'' }}</textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Requirements <span class="text-muted fw-normal">(optional)</span></label>
                            <textarea name="requirements" class="form-control" rows="3" placeholder="Technical requirements...">{{ form.requirements.value|default:'' }}</textarea>
                        </div>
                        <div class="row g-3">
                            <div class="col-md-4">
                                <label class="form-label">Priority</label>
                                <select name="priority" class="form-select">
                                    <option value="low">Low</option>
                                    <option value="medium" selected>Medium</option>
                                    <option value="high">High</option>
                                    <option value="urgent">Urgent</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Deadline</label>
                                <input type="datetime-local" name="deadline" class="form-control" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Assign To</label>
                                <select name="assigned_to" class="form-select">
                                    <option value="">-- Unassigned --</option>
                                    {% for programmer in available_programmers %}
                                    <option value="{{ programmer.id }}">{{ programmer.full_name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>
                        <div class="d-flex gap-2 mt-4">
                            <button type="submit" class="btn btn-primary flex-grow-1 py-2">
                                <i class="fas fa-rocket me-2"></i>Create Project
                            </button>
                            <a href="{% url 'admin_dashboard' %}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
