<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Programmer Todo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    {% load static %}
    <link href="{% static 'css/style.css' %}" rel="stylesheet">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card" style="max-width: 480px;">
            <div class="text-center mb-4">
                <i class="fas fa-code fa-2x text-dark mb-2"></i>
                <h4 class="fw-bold">Create Account</h4>
                <p class="text-muted">Join as a programmer</p>
            </div>

            {% if form.errors %}
            <div class="alert alert-danger">
                {% for field, errors in form.errors.items %}
                    {% for error in errors %}
                    <p class="mb-0">{{ error }}</p>
                    {% endfor %}
                {% endfor %}
            </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-medium">Full Name</label>
                        <input type="text" name="full_name" class="form-control" value="{{ form.full_name.value|default:'' }}" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-medium">Username</label>
                        <input type="text" name="username" class="form-control" value="{{ form.username.value|default:'' }}" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-medium">Email</label>
                    <input type="email" name="email" class="form-control" value="{{ form.email.value|default:'' }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-medium">Phone (optional)</label>
                    <input type="text" name="phone" class="form-control" value="{{ form.phone.value|default:'' }}">
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-medium">Password</label>
                        <input type="password" name="password1" class="form-control" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-medium">Confirm Password</label>
                        <input type="password" name="password2" class="form-control" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2">Create Account</button>
            </form>

            <p class="text-center text-muted mt-3 mb-0">
                Already have an account? <a href="{% url 'login' %}" class="text-dark fw-medium">Sign in</a>
            </p>
        </div>
    </div>
</body>
</html>
