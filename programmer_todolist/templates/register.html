<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Programmer Todo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    {% load static %}
    <link href="{% static 'css/style.css' %}?v=2" rel="stylesheet">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card" style="max-width: 500px;">
            <div class="text-center mb-4">
                <i class="fas fa-code mb-3"></i>
                <h4 class="fw-bold">Create Account</h4>
                <p class="text-muted mb-0">Join as a programmer</p>
            </div>

            {% if form.errors %}
            <div class="alert alert-danger">
                <i class="fas fa-exclamation-circle me-2"></i>
                {% for field, errors in form.errors.items %}
                    {% for error in errors %}
                    <span class="d-block">{{ error }}</span>
                    {% endfor %}
                {% endfor %}
            </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" name="full_name" class="form-control" placeholder="John Doe" value="{{ form.full_name.value|default:'' }}" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="form-control" placeholder="johndoe" value="{{ form.username.value|default:'' }}" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" placeholder="john@example.com" value="{{ form.email.value|default:'' }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Phone <span class="text-muted fw-normal">(optional)</span></label>
                    <input type="text" name="phone" class="form-control" placeholder="+1 234 567 890" value="{{ form.phone.value|default:'' }}">
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password1" class="form-control" placeholder="••••••••" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Confirm Password</label>
                        <input type="password" name="password2" class="form-control" placeholder="••••••••" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 mt-2">
                    <i class="fas fa-user-plus me-2"></i>Create Account
                </button>
            </form>

            <p class="text-center text-muted mt-4 mb-0 small">
                Already have an account? <a href="{% url 'login' %}" class="text-primary fw-semibold text-decoration-none">Sign in</a>
            </p>
        </div>
    </div>
</body>
</html>
